<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#002244" />
    <meta name="description" content="Real-time flag football scoreboard for Seahawks games" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Seahawks" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
    <title>Seahawks Sideline</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Reload once if a JS/CSS chunk 404s after a Vercel redeploy -->
    <script>
      window.addEventListener('error', function(e) {
        var t = e.target && e.target.tagName
        if (t === 'SCRIPT' || t === 'LINK') {
          if (!sessionStorage.getItem('reloaded')) {
            sessionStorage.setItem('reloaded', '1')
            window.location.reload()
          }
        }
      }, true)
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
